mode: rule
log-level: info
mixed-port: 7897
allow-lan: false
unified-delay: true
tcp-concurrent: true

dns:
    enable: true
    ipv6: false
    enhanced-mode: fake-ip
    fake-ip-range: 198.18.0.1/16
    use-hosts: true
    default-nameserver: [223.5.5.5, 119.29.29.29]
    nameserver: ['https://223.5.5.5/dns-query', 'https://1.12.12.12/dns-query']
    fallback: ['https://1.1.1.1/dns-query', 'https://8.8.8.8/dns-query']
    fallback-filter: { geoip: true, ipcidr: [240.0.0.0/4, 0.0.0.0/32] }

proxy-providers:
    cyberguard:
      type: http
      path: ./subscribe/cyberguard.yaml
      url: https://cyberguard.cfd/api/v1/client/subscribe?token=6f32e78d6e8675e6d5f7606e6c937e52
      filter: '(HK)|(SG)|(TW)|(JP)|(US)|(香港)|(新加坡)|(台湾)|(日本)|(美国)|(GPT)|(流量)'
      interval: 86400
      health-check:
        enable: true
        interval: 3600
        url: http://www.gstatic.com/generate_204

proxy-groups:
  - name: PROXY
    type: select
    use:
      - cyberguard

rule-providers:
  proxy:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
    path: ./ruleset/proxy.yaml
    interval: 864000
  direct:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
    path: ./ruleset/direct.yaml
    interval: 864000

